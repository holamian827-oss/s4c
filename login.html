<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登入 - S4C 系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans text-gray-800 min-h-screen flex items-center justify-center">

    <div class="bg-white p-8 rounded-xl shadow-lg w-full max-w-md">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-blue-600 mb-2">📚 S4C</h1>
            <p class="text-gray-500">請登入以查看班級功課與測驗</p>
        </div>

        <form id="loginForm" class="flex flex-col gap-5">
            <div class="flex bg-gray-100 p-1 rounded-lg">
                <button type="button" class="role-btn flex-1 py-2 text-sm font-semibold rounded-md bg-white shadow text-blue-600 transition-all" data-role="student">學生</button>
                <button type="button" class="role-btn flex-1 py-2 text-sm font-semibold rounded-md text-gray-500 hover:text-gray-700 transition-all" data-role="teacher">老師</button>
                <button type="button" class="role-btn flex-1 py-2 text-sm font-semibold rounded-md text-gray-500 hover:text-gray-700 transition-all" data-role="admin">管理員</button>
            </div>
            <input type="hidden" id="selectedRole" value="student">

            <div id="usernameContainer">
                <label class="block text-sm font-medium text-gray-700 mb-1">學號 / 帳號</label>
                <input type="text" id="username" required placeholder="例如：22 (輸入學號)" 
                       class="w-full border border-gray-300 p-3 rounded-lg outline-none focus:ring-2 focus:ring-blue-500 transition">
            </div>

            <div id="teacherSelectContainer" class="hidden">
                <label class="block text-sm font-medium text-gray-700 mb-1">選擇您的任教科目</label>
                <select id="teacherSelect" class="w-full border border-gray-300 p-3 rounded-lg outline-none focus:ring-2 focus:ring-blue-500 transition bg-white">
                    <option value="班主任">班主任</option>
                    <option value="中文老師">中文老師</option>
                    <option value="英文老師">英文老師</option>
                    <option value="物理老師">物理老師</option>
                    <option value="化學老師">化學老師</option>
                    <option value="生物老師">生物老師</option>
                    <option value="資訊科技老師">資訊科技老師</option>
                    <option value="歷史老師">歷史老師</option>
                    <option value="地理老師">地理老師</option>
                    <option value="音樂老師">音樂老師</option>
                    <option value="視藝老師">視藝老師</option>
                </select>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">密碼</label>
                <input type="password" id="password" required placeholder="預設密碼：12345678" 
                       class="w-full border border-gray-300 p-3 rounded-lg outline-none focus:ring-2 focus:ring-blue-500 transition">
            </div>

            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg transition mt-2 shadow-md hover:shadow-lg">
                登 入
            </button>
        </form>
    </div>

    <script>
        const roleBtns = document.querySelectorAll('.role-btn');
        const selectedRoleInput = document.getElementById('selectedRole');
        const usernameInput = document.getElementById('username');
        const passwordInput = document.getElementById('password');
        const usernameContainer = document.getElementById('usernameContainer');
        const teacherSelectContainer = document.getElementById('teacherSelectContainer');
        const teacherSelect = document.getElementById('teacherSelect');

        roleBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                roleBtns.forEach(b => {
                    b.classList.remove('bg-white', 'shadow', 'text-blue-600');
                    b.classList.add('text-gray-500', 'hover:text-gray-700');
                });
                btn.classList.remove('text-gray-500', 'hover:text-gray-700');
                btn.classList.add('bg-white', 'shadow', 'text-blue-600');
                
                const role = btn.getAttribute('data-role');
                selectedRoleInput.value = role;

                if (role === 'student') {
                    usernameContainer.classList.remove('hidden');
                    teacherSelectContainer.classList.add('hidden');
                    usernameInput.required = true;
                    passwordInput.placeholder = '預設密碼：12345678';
                } else if (role === 'teacher') {
                    usernameContainer.classList.add('hidden');
                    teacherSelectContainer.classList.remove('hidden');
                    usernameInput.required = false;
                    passwordInput.placeholder = '預設密碼：12345678';
                } else if (role === 'admin') {
                    usernameContainer.classList.add('hidden');
                    teacherSelectContainer.classList.add('hidden');
                    usernameInput.required = false;
                    passwordInput.placeholder = ''; 
                }
            });
        });

        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault(); 
            const pass = passwordInput.value;
            const role = selectedRoleInput.value;
            
            let userDisplay = '';
            
            if (role === 'admin') {
                userDisplay = '系統管理員';
            } else if (role === 'teacher') {
                userDisplay = teacherSelect.value;
            } else {
                userDisplay = usernameInput.value + '_同學'; 
            }

            // 動態檢查密碼 (從 localStorage 讀取，如果冇就用預設)
            let expectedPwd = (role === 'admin') ? 'Admin1234' : '12345678';
            const savedCustomPwd = localStorage.getItem(`pwd_${userDisplay}`);
            if (savedCustomPwd) {
                expectedPwd = savedCustomPwd;
            }

            if (pass === expectedPwd) {
                localStorage.setItem('s4c_user', userDisplay);
                localStorage.setItem('s4c_role', role);
                window.location.href = `index.html?user=${encodeURIComponent(userDisplay)}&role=${encodeURIComponent(role)}`; 
            } else {
                alert('密碼錯誤！請檢查您的權限與密碼。');
            }
        });
    </script>
</body>
</html>
